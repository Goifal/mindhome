<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jarvis Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #040810;
  --bg-secondary: #0a1018;
  --bg-card: #0c1520;
  --bg-card-hover: #111e2e;
  --bg-input: #081018;
  --accent: #00d4ff;
  --accent-dim: rgba(0, 212, 255, 0.1);
  --accent-glow: rgba(0, 212, 255, 0.35);
  --blue: #00d4ff;
  --success: #00e676;
  --success-dim: rgba(0, 230, 118, 0.12);
  --danger: #ff3d3d;
  --danger-dim: rgba(255, 61, 61, 0.12);
  --text-primary: #c8dce8;
  --text-secondary: #6889a0;
  --text-muted: #3a5568;
  --border: rgba(0, 212, 255, 0.06);
  --border-hover: rgba(0, 212, 255, 0.15);
  --border-accent: rgba(0, 212, 255, 0.25);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.6);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.7);
  --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.15);
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
}

body {
  background-image:
    radial-gradient(circle at 20% 50%, rgba(0,212,255,0.015) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(0,212,255,0.01) 0%, transparent 40%);
}

/* Holographic grid overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.012) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  animation: gridFlicker 8s ease-in-out infinite;
}

/* Scan line */
body::after {
  content: '';
  position: fixed;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(0,212,255,0.15) 20%, rgba(0,212,255,0.3) 50%, rgba(0,212,255,0.15) 80%, transparent 95%);
  animation: scanLine 8s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
  filter: drop-shadow(0 0 6px rgba(0,212,255,0.4));
}

@keyframes gridFlicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes scanLine {
  0%, 100% { top: 5%; opacity: 0.4; }
  50% { top: 95%; opacity: 0.15; }
}

/* ========== Boot Screen (MCU Style) ========== */
.boot-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow: hidden;
  background-image:
    radial-gradient(circle at center, rgba(0,212,255,0.06) 0%, transparent 50%),
    linear-gradient(rgba(0,212,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.018) 1px, transparent 1px);
  background-size: 100% 100%, 28px 28px, 28px 28px;
}

.boot-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,212,255,0.1) 0%, rgba(0,212,255,0.02) 30%, transparent 60%);
  animation: bootCorePulse 2s ease-in-out infinite;
  pointer-events: none;
}

/* Screen corner brackets */
.boot-corner { position: absolute; z-index: 2; opacity: 0; animation: bootFadeIn 0.4s ease forwards; }
.boot-corner::before, .boot-corner::after { content: ''; position: absolute; background: rgba(0,212,255,0.5); }
.boot-corner-tl { top: 16px; left: 16px; width: 50px; height: 50px; animation-delay: 0.2s; }
.boot-corner-tl::before { top: 0; left: 0; width: 50px; height: 1px; }
.boot-corner-tl::after { top: 0; left: 0; width: 1px; height: 50px; }
.boot-corner-tr { top: 16px; right: 16px; width: 50px; height: 50px; animation-delay: 0.3s; }
.boot-corner-tr::before { top: 0; right: 0; width: 50px; height: 1px; }
.boot-corner-tr::after { top: 0; right: 0; width: 1px; height: 50px; }
.boot-corner-bl { bottom: 16px; left: 16px; width: 50px; height: 50px; animation-delay: 0.4s; }
.boot-corner-bl::before { bottom: 0; left: 0; width: 50px; height: 1px; }
.boot-corner-bl::after { bottom: 0; left: 0; width: 1px; height: 50px; }
.boot-corner-br { bottom: 16px; right: 16px; width: 50px; height: 50px; animation-delay: 0.5s; }
.boot-corner-br::before { bottom: 0; right: 0; width: 50px; height: 1px; }
.boot-corner-br::after { bottom: 0; right: 0; width: 1px; height: 50px; }

/* Full-width scan line */
.boot-scanline { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 5%, rgba(0,212,255,0.12) 15%, rgba(0,212,255,0.5) 50%, rgba(0,212,255,0.12) 85%, transparent 95%); filter: drop-shadow(0 0 10px rgba(0,212,255,0.6)); animation: bootScan 5s ease-in-out infinite; z-index: 3; pointer-events: none; }

/* Ambient data readouts */
.boot-data { position: absolute; font-family: var(--mono); font-size: 9px; color: rgba(0,212,255,0.2); letter-spacing: 1px; line-height: 2.2; white-space: pre; z-index: 1; opacity: 0; animation: bootFadeIn 1s ease 0.5s forwards; }
.boot-data-left { left: 24px; top: 50%; transform: translateY(-50%); text-align: left; }
.boot-data-right { right: 24px; top: 50%; transform: translateY(-50%); text-align: right; }

/* HUD container */
.boot-hud { position: relative; width: 420px; height: 420px; margin-bottom: 24px; }

/* Arc reactor core */
.boot-core { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%,-50%); border-radius: 50%; background: var(--accent); z-index: 10; opacity: 0; animation: bootCoreIgnite 0.6s ease 0.1s forwards; }
.boot-core-ring { position: absolute; top: 50%; left: 50%; width: 28px; height: 28px; transform: translate(-50%,-50%); border-radius: 50%; border: 1px solid rgba(0,212,255,0.4); z-index: 9; opacity: 0; animation: bootCorePulseRing 2s ease-out 0.3s infinite; }

/* Ring layers */
.boot-r { position: absolute; inset: 0; will-change: transform; opacity: 0; }
.boot-r.active { opacity: 1; transition: opacity 0.4s ease; }
.boot-r1 { animation: bootSpin 3s linear infinite; }
.boot-r2 { animation: bootSpinR 5s linear infinite; }
.boot-r3 { /* Main ring — no rotation, draws in */ }
.boot-r4 { animation: bootSpinR 8s linear infinite; }
.boot-r5 { animation: bootSpin 12s linear infinite; }
.boot-r6 { animation: bootSpinR 18s linear infinite; }
.boot-r7 { animation: bootSpin 25s linear infinite; }
.boot-r8 { animation: bootSpinR 30s linear infinite; }
.boot-ring-draw { filter: drop-shadow(0 0 8px rgba(0,212,255,0.7)); stroke-dashoffset: 553; animation: bootDraw 2.5s ease-out 0.5s forwards; }

/* Crosshair lines */
.boot-crosshair line { opacity: 0; animation: bootFadeIn 0.3s ease forwards; }

/* Logo text */
.boot-logo { position: absolute; top: calc(50% - 10px); left: 50%; transform: translate(-50%,-50%); font-size: 26px; font-weight: 700; color: var(--accent); font-family: var(--mono); letter-spacing: 6px; white-space: nowrap; z-index: 11; text-shadow: 0 0 30px rgba(0,212,255,0.8), 0 0 60px rgba(0,212,255,0.3), 0 0 100px rgba(0,212,255,0.15); opacity: 0; }
.boot-subtitle { position: absolute; top: calc(50% + 14px); left: 50%; transform: translateX(-50%); font-size: 8px; font-family: var(--mono); color: rgba(0,212,255,0.35); letter-spacing: 4px; text-transform: uppercase; white-space: nowrap; z-index: 11; opacity: 0; }

/* Progress bar */
.boot-progress { display: flex; align-items: center; gap: 12px; width: 320px; margin-bottom: 18px; opacity: 0; animation: bootFadeIn 0.3s ease 0.8s forwards; }
.boot-progress-track { flex: 1; height: 2px; background: rgba(0,212,255,0.08); border-radius: 1px; overflow: hidden; position: relative; }
.boot-progress-track::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.05), transparent); }
.boot-progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, rgba(0,212,255,0.5), var(--accent)); border-radius: 1px; box-shadow: 0 0 8px rgba(0,212,255,0.5), 0 0 20px rgba(0,212,255,0.2); transition: width 0.3s ease; }
.boot-progress-pct { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; text-shadow: 0 0 10px rgba(0,212,255,0.4); letter-spacing: 1px; }

/* Status text */
.boot-text { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 3px; min-height: 16px; text-transform: uppercase; text-shadow: 0 0 12px rgba(0,212,255,0.4); margin-bottom: 16px; }

/* System modules */
.boot-systems { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
.boot-sys { display: flex; align-items: center; gap: 6px; font-size: 9px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s ease; }
.boot-sys.visible { opacity: 1; }
.boot-sys .sys-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); transition: all 0.4s ease; flex-shrink: 0; }
.boot-sys.online .sys-dot { background: var(--success); box-shadow: 0 0 6px rgba(0,230,118,0.6), 0 0 14px rgba(0,230,118,0.2); }
.boot-sys.online { color: var(--success); }

/* Fade out */
.boot-screen.fade-out { animation: bootFadeOut 0.6s ease forwards; }

/* Boot keyframes */
@keyframes bootSpin { to { transform: rotate(360deg); } }
@keyframes bootSpinR { to { transform: rotate(-360deg); } }
@keyframes bootDraw { to { stroke-dashoffset: 0; } }
@keyframes bootFadeIn { to { opacity: 1; } }
@keyframes bootFadeOut { to { opacity: 0; pointer-events: none; } }
@keyframes bootCorePulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
@keyframes bootCoreIgnite { 0% { opacity: 0; box-shadow: none; width: 2px; height: 2px; } 50% { opacity: 1; width: 14px; height: 14px; box-shadow: 0 0 40px rgba(0,212,255,1), 0 0 80px rgba(0,212,255,0.5); } 100% { opacity: 1; width: 10px; height: 10px; box-shadow: 0 0 20px rgba(0,212,255,0.9), 0 0 50px rgba(0,212,255,0.4), 0 0 100px rgba(0,212,255,0.2); } }
@keyframes bootCoreGlow { 0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.9), 0 0 50px rgba(0,212,255,0.4), 0 0 100px rgba(0,212,255,0.2); } 50% { box-shadow: 0 0 30px rgba(0,212,255,1), 0 0 70px rgba(0,212,255,0.5), 0 0 120px rgba(0,212,255,0.3); } }
@keyframes bootCorePulseRing { 0% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; } 100% { transform: translate(-50%,-50%) scale(3); opacity: 0; } }
@keyframes bootScan { 0%,100% { top: 5%; } 50% { top: 95%; } }

/* ========== Layout ========== */
.app {
  display: none;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.app.active {
  display: flex;
}

/* ========== Header ========== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(0,212,255,0.1);
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(8,14,24,0.97), rgba(4,8,16,0.98));
  backdrop-filter: blur(20px);
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
  filter: drop-shadow(0 0 4px rgba(0,212,255,0.3));
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 5px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0,212,255,0.15);
  text-transform: uppercase;
  animation: logoGlow 3s ease-in-out infinite alternate;
}

@keyframes logoGlow {
  0% { text-shadow: 0 0 15px rgba(0,212,255,0.3); }
  100% { text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2); }
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s, box-shadow 0.3s;
}

.status-dot.online {
  background: var(--success);
  box-shadow: 0 0 8px rgba(0,230,118,0.5), 0 0 20px rgba(0,230,118,0.2);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.mood-badge {
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border-accent);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ========== Person Switcher ========== */
.person-switcher {
  position: relative;
}

.person-current {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  white-space: nowrap;
}

.person-current:hover {
  border-color: var(--border-accent);
  color: var(--accent);
  background: var(--accent-dim);
}

.person-current .person-icon {
  width: 14px; height: 14px;
  opacity: 0.6;
}

.person-current .person-arrow {
  width: 10px; height: 10px;
  opacity: 0.4;
  transition: transform 0.2s;
}

.person-switcher.open .person-arrow {
  transform: rotate(180deg);
}

.person-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 160px;
  background: var(--bg-card);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg), 0 0 20px rgba(0,212,255,0.08);
  z-index: 100;
  overflow: hidden;
}

.person-switcher.open .person-dropdown {
  display: block;
  animation: dropIn 0.15s ease-out;
}

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.person-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border: none;
  background: none;
  width: 100%;
  font-family: var(--font);
}

.person-option:hover {
  background: var(--accent-dim);
  color: var(--text-primary);
}

.person-option.active {
  color: var(--accent);
  background: rgba(0,212,255,0.06);
}

.person-option .person-role {
  font-size: 9px;
  color: var(--text-muted);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-left: auto;
}

/* ========== Messages Area ========== */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }
.messages::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.4); }

.msg {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: msgIn 0.3s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }
.msg.proactive { align-self: flex-start; }

.msg-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid var(--border);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
}

.msg.user .msg-avatar {
  background: rgba(0, 212, 255, 0.08);
  color: var(--accent);
  border-color: rgba(0, 212, 255, 0.25);
}

.msg.assistant .msg-avatar {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--border-accent);
  box-shadow: 0 0 12px rgba(0,212,255,0.2), 0 0 30px rgba(0,212,255,0.05);
  animation: avatarPulse 3s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(0,212,255,0.2), 0 0 30px rgba(0,212,255,0.05); }
  50% { box-shadow: 0 0 18px rgba(0,212,255,0.35), 0 0 40px rgba(0,212,255,0.1); }
}

.msg.proactive .msg-avatar {
  background: var(--success-dim);
  color: var(--success);
  border-color: rgba(0, 230, 118, 0.3);
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius-md);
  line-height: 1.55;
  font-size: 14px;
  word-break: break-word;
  position: relative;
}

.msg.user .msg-bubble {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.15);
  border-top-right-radius: 2px;
}

.msg.assistant .msg-bubble {
  background: linear-gradient(135deg, rgba(12,21,32,0.95), rgba(8,16,24,0.98));
  border: 1px solid rgba(0, 212, 255, 0.1);
  border-top-left-radius: 2px;
  backdrop-filter: blur(4px);
}

.msg.assistant .msg-bubble::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, rgba(0,212,255,0.4), rgba(0,212,255,0.1), transparent);
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}

.msg.assistant .msg-bubble::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius-md);
  border-top-left-radius: 2px;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  box-shadow: 0 0 16px rgba(0,212,255,0.06), inset 0 0 20px rgba(0,212,255,0.02);
}

.msg.assistant .msg-bubble:hover::after {
  opacity: 1;
}

.msg.proactive .msg-bubble {
  background: rgba(0, 230, 118, 0.04);
  border: 1px solid rgba(0, 230, 118, 0.12);
  border-top-left-radius: 2px;
  font-style: italic;
}

.msg-bubble .msg-time {
  display: block;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 6px;
  font-family: var(--mono);
  letter-spacing: 0.5px;
}

.msg-bubble .msg-actions {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.action-tag {
  font-size: 10px;
  font-family: var(--mono);
  background: var(--accent-dim);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border-accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* File attachment in message */
.msg-file {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding: 8px 12px;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.1);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--mono);
  color: var(--accent);
}

.msg-file-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.msg-file-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.msg-file-size {
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 0 20px;
}

.typing-indicator.active { display: flex; }

.typing-indicator .dots {
  display: flex;
  align-items: center;
  gap: 12px;
}

.typing-indicator .msg-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--border-accent);
  font-family: var(--mono);
  box-shadow: 0 0 10px rgba(0,212,255,0.15);
}

.typing-dots {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(12,21,32,0.95), rgba(8,16,24,0.98));
  border: 1px solid rgba(0, 212, 255, 0.1);
  border-radius: var(--radius-md);
  border-top-left-radius: 2px;
}

.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ========== Input Area ========== */
.input-area {
  padding: 14px 20px;
  border-top: 1px solid rgba(0,212,255,0.1);
  flex-shrink: 0;
  background: rgba(8,14,24,0.95);
  backdrop-filter: blur(16px);
  position: relative;
}

.input-area::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
}

/* File upload drop zone */
.drop-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0, 212, 255, 0.06);
  border: 2px dashed rgba(0, 212, 255, 0.4);
  border-radius: var(--radius-md);
  z-index: 10;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.drop-overlay.active {
  display: flex;
}

.drop-overlay-text {
  font-size: 14px;
  color: var(--accent);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(0,212,255,0.4);
}

/* File preview bar */
.file-preview-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.12);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--mono);
  color: var(--accent);
}

.file-preview-bar.active { display: flex; }

.file-preview-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-preview-size {
  font-size: 10px;
  color: var(--text-muted);
}

.file-preview-remove {
  width: 20px;
  height: 20px;
  border: 1px solid rgba(255,61,61,0.3);
  border-radius: 50%;
  background: transparent;
  color: var(--danger);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all 0.15s;
}

.file-preview-remove:hover {
  background: var(--danger-dim);
  border-color: var(--danger);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.btn-upload {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid rgba(0,212,255,0.15);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  color: var(--text-muted);
}

.btn-upload:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.05);
  box-shadow: 0 0 12px rgba(0,212,255,0.1);
}

.btn-upload svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.input-wrap {
  flex: 1;
  position: relative;
}

.input-wrap textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid rgba(0,212,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 14px;
  padding: 11px 14px;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 140px;
  line-height: 1.45;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-wrap textarea::placeholder {
  color: var(--text-muted);
}

.input-wrap textarea:focus {
  border-color: var(--border-accent);
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.1), 0 0 40px rgba(0, 212, 255, 0.03);
}

.btn-send {
  width: 42px; height: 42px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02));
  border: 1px solid var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  flex-shrink: 0;
  box-shadow: 0 0 15px rgba(0,212,255,0.15), inset 0 0 15px rgba(0,212,255,0.05);
  position: relative;
  overflow: hidden;
}

.btn-send::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,212,255,0.15), transparent 70%);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.btn-send:hover {
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
  box-shadow: 0 0 30px rgba(0,212,255,0.35), inset 0 0 20px rgba(0,212,255,0.1);
  transform: scale(1.02);
}

.btn-send:hover::before {
  opacity: 1;
}

.btn-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  box-shadow: none;
  border-color: var(--text-muted);
}

.btn-send svg {
  width: 18px; height: 18px;
  fill: var(--accent);
}

.btn-send:disabled svg {
  fill: var(--text-muted);
}

/* ========== Voice Mode Button ========== */
.btn-voice {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid rgba(0,212,255,0.15);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  color: var(--text-muted);
}

.btn-voice:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.05);
  box-shadow: 0 0 12px rgba(0,212,255,0.1);
}

.btn-voice svg {
  width: 18px; height: 18px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ========== Voice Overlay ========== */
.voice-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(4,8,16,0.97);
  z-index: 1000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  backdrop-filter: blur(30px);
}

.voice-overlay.active { display: flex; }

.voice-orb-wrap {
  position: relative;
  width: 200px; height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.voice-orb {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.25) 0%, rgba(0,212,255,0.05) 70%, transparent 100%);
  border: 2px solid rgba(0,212,255,0.3);
  transition: all 0.3s ease;
  box-shadow: 0 0 40px rgba(0,212,255,0.15);
}

.voice-orb.listening {
  animation: orbPulse 1.5s ease-in-out infinite;
  border-color: var(--accent);
  box-shadow: 0 0 60px rgba(0,212,255,0.4);
}

.voice-orb.thinking {
  animation: orbSpin 2s linear infinite;
  border-color: rgba(0,212,255,0.5);
}

.voice-orb.speaking {
  animation: orbSpeak 0.6s ease-in-out infinite;
  border-color: var(--success);
  box-shadow: 0 0 60px rgba(0,230,118,0.3);
}

@keyframes orbPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0,212,255,0.2); }
  50% { transform: scale(1.08); box-shadow: 0 0 80px rgba(0,212,255,0.5); }
}

@keyframes orbSpin {
  0% { border-color: rgba(0,212,255,0.5); box-shadow: 0 0 40px rgba(0,212,255,0.2); }
  50% { border-color: rgba(0,212,255,0.8); box-shadow: 0 0 70px rgba(0,212,255,0.4); }
  100% { border-color: rgba(0,212,255,0.5); box-shadow: 0 0 40px rgba(0,212,255,0.2); }
}

@keyframes orbSpeak {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.voice-status {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 3px;
}

.voice-transcript {
  max-width: 500px;
  text-align: center;
  font-size: 16px;
  color: var(--text-primary);
  min-height: 48px;
  line-height: 1.5;
  padding: 0 20px;
}

.voice-transcript .user-text {
  color: var(--text-secondary);
  font-style: italic;
  margin-bottom: 8px;
}

.voice-transcript .jarvis-text {
  color: var(--text-primary);
}

.voice-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.voice-close:hover {
  background: rgba(255,61,61,0.1);
  border-color: var(--danger);
  color: var(--danger);
}

/* ========== Welcome Screen ========== */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 20px;
  padding: 40px;
  text-align: center;
  position: relative;
}

.welcome::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, rgba(0,212,255,0.01) 40%, transparent 70%);
  pointer-events: none;
  animation: welcomeGlow 4s ease-in-out infinite;
}

@keyframes welcomeGlow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

.welcome-logo {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--accent);
  text-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(0,212,255,0.2), 0 0 120px rgba(0,212,255,0.08);
  text-transform: uppercase;
  font-family: var(--mono);
  position: relative;
  z-index: 1;
}

.welcome-sub {
  color: var(--text-secondary);
  font-size: 14px;
  max-width: 360px;
  line-height: 1.6;
  position: relative;
  z-index: 1;
}

.welcome-hints {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 16px;
  position: relative;
  z-index: 1;
}

.hint-chip {
  font-size: 12px;
  color: var(--text-secondary);
  background: linear-gradient(135deg, rgba(12,21,32,0.9), rgba(8,16,24,0.95));
  border: 1px solid rgba(0,212,255,0.1);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: var(--mono);
  position: relative;
  overflow: hidden;
}

.hint-chip::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.hint-chip:hover {
  border-color: var(--border-accent);
  color: var(--accent);
  background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02));
  box-shadow: 0 0 20px rgba(0,212,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}

.hint-chip:hover::before {
  opacity: 1;
}

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(12,21,32,0.95);
  color: var(--text-primary);
  border: 1px solid var(--border-accent);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--mono);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  backdrop-filter: blur(8px);
  text-transform: uppercase;
  letter-spacing: 1px;
  max-width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg), 0 0 20px rgba(0,212,255,0.1);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

.toast.toast-error {
  border-color: rgba(255,61,61,0.4);
  color: var(--danger);
  box-shadow: var(--shadow-lg), 0 0 20px rgba(255,61,61,0.15);
}

.toast.toast-success {
  border-color: rgba(0,230,118,0.4);
  color: var(--success);
  box-shadow: var(--shadow-lg), 0 0 20px rgba(0,230,118,0.15);
}

/* ========== Connection Banner ========== */
.conn-banner {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  background: rgba(255, 61, 61, 0.06);
  border-bottom: 1px solid rgba(255, 61, 61, 0.15);
  font-size: 12px;
  color: var(--danger);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.conn-banner.show { display: flex; }

/* ========== Upload progress ========== */
.upload-progress {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
}

.upload-progress.active { display: flex; }

.upload-progress-bar {
  flex: 1;
  height: 3px;
  background: rgba(0,212,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}

.upload-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
  box-shadow: 0 0 8px rgba(0,212,255,0.5);
}

.upload-progress-text {
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--mono);
  min-width: 60px;
  text-align: right;
}

/* ========== Mobile ========== */
@media (max-width: 600px) {
  .app { max-width: 100%; }
  .msg { max-width: 92%; }
  .header { padding: 12px 16px; }
  .messages { padding: 12px; gap: 12px; }
  .input-area { padding: 12px 16px; }
  .welcome-logo { font-size: 28px; letter-spacing: 6px; }
  .welcome { padding: 24px; }
  .boot-hud { width: 260px; height: 260px; }
  .boot-logo { font-size: 18px; letter-spacing: 4px; }
  .boot-subtitle { font-size: 7px; letter-spacing: 3px; }
  .boot-text { font-size: 9px; letter-spacing: 2px; }
  .boot-systems { gap: 8px; }
  .boot-progress { width: 240px; }
  .boot-data { display: none; }
  .boot-corner { width: 30px; height: 30px; }
  .boot-corner-tl::before, .boot-corner-tr::before, .boot-corner-bl::before, .boot-corner-br::before { width: 30px; }
  .boot-corner-tl::after, .boot-corner-tr::after, .boot-corner-bl::after, .boot-corner-br::after { height: 30px; }
  .logo { font-size: 15px; letter-spacing: 4px; }
  .hint-chip { font-size: 11px; padding: 8px 14px; }
}

@media (max-width: 380px) {
  .boot-hud { width: 200px; height: 200px; }
  .boot-logo { font-size: 14px; letter-spacing: 3px; }
  .boot-progress { width: 200px; }
  .welcome-logo { font-size: 22px; letter-spacing: 4px; }
}

/* ========== Reduced Motion ========== */
@media (prefers-reduced-motion: reduce) {
  .boot-r, .boot-scanline, .boot-core, .boot-core-ring,
  body::after, body::before { animation: none !important; }
  .boot-r { opacity: 1 !important; }
  .msg { animation: none !important; }
  .typing-dots span { animation: none !important; opacity: 0.5; }
}

/* Phase 9A: Jarvis Status Orb */
.jarvis-orb {
  width: 12px; height: 12px; border-radius: 50%; display: inline-block;
  margin-right: 8px; vertical-align: middle; transition: background-color 0.5s;
}
.jarvis-orb.listening { background: #4fc3f7; animation: pulse 2s infinite; }
.jarvis-orb.thinking { background: #ffb74d; animation: pulse 1s infinite; }
.jarvis-orb.alert { background: #ef5350; animation: pulse 0.5s infinite; }
.jarvis-orb.satisfied { background: #66bb6a; }
.jarvis-orb.neutral { background: #90a4ae; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<!-- BOOT SCREEN (MCU Style) -->
<div id="bootScreen" class="boot-screen">
  <!-- Screen corner brackets -->
  <div class="boot-corner boot-corner-tl"></div>
  <div class="boot-corner boot-corner-tr"></div>
  <div class="boot-corner boot-corner-bl"></div>
  <div class="boot-corner boot-corner-br"></div>
  <!-- Full-width scan line -->
  <div class="boot-scanline"></div>
  <!-- Ambient data readouts -->
  <div class="boot-data boot-data-left" id="bootDataL"></div>
  <div class="boot-data boot-data-right" id="bootDataR"></div>
  <!-- Main HUD -->
  <div class="boot-hud">
    <!-- Arc reactor core -->
    <div class="boot-core"></div>
    <div class="boot-core-ring"></div>
    <!-- Ring 1: Innermost — fine ticks, fast spin -->
    <svg class="boot-r boot-r1" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="38" fill="none" stroke="rgba(0,212,255,0.4)" stroke-width="0.8" stroke-dasharray="2 4"/>
    </svg>
    <!-- Ring 2: Tick marks, counter-rotation -->
    <svg class="boot-r boot-r2" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="55" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="0.6" stroke-dasharray="1 7"/>
      <circle cx="210" cy="210" r="58" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="4" stroke-dasharray="1 20"/>
    </svg>
    <!-- Ring 3: Main ring — draws during boot -->
    <svg class="boot-r boot-r3" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="78" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="1.5"/>
      <circle cx="210" cy="210" r="78" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="490" stroke-dashoffset="490" stroke-linecap="round" class="boot-ring-draw"/>
    </svg>
    <!-- Ring 4: Data segments, counter-rotation -->
    <svg class="boot-r boot-r4" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="98" fill="none" stroke="rgba(0,212,255,0.18)" stroke-width="0.8" stroke-dasharray="25 12 4 12" stroke-linecap="round"/>
    </svg>
    <!-- Ring 5: Wide tick marks -->
    <svg class="boot-r boot-r5" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="118" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="0.5" stroke-dasharray="1 5"/>
      <circle cx="210" cy="210" r="120" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="6" stroke-dasharray="2 28"/>
    </svg>
    <!-- Ring 6: Thin scatter, counter-rotation -->
    <svg class="boot-r boot-r6" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="140" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="0.5" stroke-dasharray="8 20 2 20"/>
    </svg>
    <!-- Ring 7: Micro ticks -->
    <svg class="boot-r boot-r7" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="160" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="0.4" stroke-dasharray="1 4"/>
      <circle cx="210" cy="210" r="163" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="10" stroke-dasharray="2 40"/>
    </svg>
    <!-- Ring 8: Outermost faint -->
    <svg class="boot-r boot-r8" viewBox="0 0 420 420">
      <circle cx="210" cy="210" r="185" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="0.4" stroke-dasharray="12 25"/>
      <circle cx="210" cy="210" r="195" fill="none" stroke="rgba(0,212,255,0.025)" stroke-width="0.3" stroke-dasharray="3 15"/>
    </svg>
    <!-- Crosshair lines -->
    <svg class="boot-r boot-crosshair" viewBox="0 0 420 420" style="opacity:0;">
      <line x1="210" y1="135" x2="210" y2="165" stroke="rgba(0,212,255,0.25)" stroke-width="0.5"/>
      <line x1="210" y1="255" x2="210" y2="285" stroke="rgba(0,212,255,0.25)" stroke-width="0.5"/>
      <line x1="135" y1="210" x2="165" y2="210" stroke="rgba(0,212,255,0.25)" stroke-width="0.5"/>
      <line x1="255" y1="210" x2="285" y2="210" stroke="rgba(0,212,255,0.25)" stroke-width="0.5"/>
      <!-- Diagonal ticks -->
      <line x1="172" y1="172" x2="182" y2="182" stroke="rgba(0,212,255,0.15)" stroke-width="0.4"/>

<script>
// ============================================================
// JARVIS Chat — WebSocket + Streaming + File Upload
// ============================================================

const API = location.origin;
const WS_URL = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/api/assistant/ws`;

let ws = null;
let reconnectTimer = null;
let reconnectDelay = 1000;
let maxReconnectDelay = 15000;
let streamBuffer = '';
let streamBubble = null;
let isStreaming = false;
let messageCount = 0;
let currentPerson = '';
let householdMembers = [];
let personTitles = {};
let pendingFile = null;
let toastTimer = null;
let streamTimeout = null;
const STREAM_TIMEOUT_MS = 30000;

// Load household & person-switcher (oeffentlicher Endpoint, kein Token noetig)
fetch(`${API}/api/chat/config`).then(r => r.ok ? r.json() : null).then(d => {
  if (!d) return;
  const primary = d.primary_user || '';
  personTitles = d.person_titles || {};
  // owners sind bereits auf role === 'owner' gefiltert
  householdMembers = (d.owners || []).filter(m => m.name);

  // Restore saved person or use primary
  const saved = localStorage.getItem('jarvis_chat_person');
  const validNames = householdMembers.map(m => m.name.toLowerCase());
  if (saved && validNames.includes(saved.toLowerCase())) {
    currentPerson = saved;
  } else {
    currentPerson = primary;
  }

  renderPersonSwitcher();
  updateGreeting();
}).catch(() => {});

// --- DOM ---
const $app = document.getElementById('app');
const $boot = document.getElementById('bootScreen');
const $bootText = document.getElementById('bootText');
const $bootSystems = document.getElementById('bootSystems');
const $bootLogo = document.getElementById('bootLogo');
const $bootSub = document.getElementById('bootSub');
const $bootProgBar = document.getElementById('bootProgBar');
const $bootProgPct = document.getElementById('bootProgPct');
const $bootDataL = document.getElementById('bootDataL');
const $bootDataR = document.getElementById('bootDataR');
const $messages = document.getElementById('messages');
const $welcome = document.getElementById('welcome');
const $input = document.getElementById('input');
const $btnSend = document.getElementById('btnSend');
const $typing = document.getElementById('typing');
const $statusDot = document.getElementById('statusDot');
const $moodBadge = document.getElementById('moodBadge');
const $connBanner = document.getElementById('connBanner');
const $toast = document.getElementById('toast');
const $inputArea = document.getElementById('inputArea');
const $dropOverlay = document.getElementById('dropOverlay');
const $filePreview = document.getElementById('filePreview');
const $filePreviewName = document.getElementById('filePreviewName');
const $filePreviewSize = document.getElementById('filePreviewSize');
const $fileInput = document.getElementById('fileInput');
const $uploadProgress = document.getElementById('uploadProgress');
const $uploadFill = document.getElementById('uploadFill');
const $uploadText = document.getElementById('uploadText');
const $personSwitcher = document.getElementById('personSwitcher');
const $personBtn = document.getElementById('personBtn');
const $personName = document.getElementById('personName');
const $personDropdown = document.getElementById('personDropdown');

// ========== Person Switcher ==========
function renderPersonSwitcher() {
  const displayName = getPersonTitle(currentPerson) || 'Sir';
  if (householdMembers.length < 2) {
    // Nur 1 Person oder keine — Switcher zeigt nur den Namen, kein Dropdown
    $personName.textContent = displayName;
    $personBtn.style.cursor = 'default';
    $personBtn.querySelector('.person-arrow').style.display = 'none';
    return;
  }

  $personName.textContent = displayName;

  $personDropdown.innerHTML = householdMembers.map(m => {
    const isActive = m.name.toLowerCase() === currentPerson.toLowerCase();
    const role = m.role || 'member';
    const roleLabel = role === 'owner' ? 'Owner' : role === 'guest' ? 'Gast' : '';
    return `<button class="person-option${isActive ? ' active' : ''}" data-person="${m.name}">
      ${getPersonTitle(m.name)}
      ${roleLabel ? `<span class="person-role">${roleLabel}</span>` : ''}
    </button>`;
  }).join('');
}

function getPersonTitle(name) {
  if (!name) return '';
  const title = personTitles[name.toLowerCase()];
  return title || name;
}

function selectPerson(name) {
  currentPerson = name;
  localStorage.setItem('jarvis_chat_person', name);
  $personSwitcher.classList.remove('open');
  renderPersonSwitcher();
  updateGreeting();
}

$personBtn.addEventListener('click', () => {
  if (householdMembers.length < 2) return;
  $personSwitcher.classList.toggle('open');
});

$personDropdown.addEventListener('click', (e) => {
  const opt = e.target.closest('.person-option');
  if (opt) selectPerson(opt.dataset.person);
});

// Close dropdown on outside click
document.addEventListener('click', (e) => {
  if (!$personSwitcher.contains(e.target)) {
    $personSwitcher.classList.remove('open');
  }
});

// ========== Boot Sequence (MCU Style) ==========
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(el, text, speed) {
  el.textContent = '';
  for (const ch of text) { el.textContent += ch; await sleep(speed); }
}

// MCU-style decode/scramble text effect
async function decodeText(el, text, speed) {
  const glyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.:/-';
  el.textContent = '';
  el.style.opacity = '1';
  let resolved = '';
  for (let i = 0; i < text.length; i++) {
    if (text[i] === ' ' || text[i] === '.') { resolved += text[i]; el.textContent = resolved; await sleep(speed * 0.5); continue; }
    for (let j = 0; j < 3; j++) {
      el.textContent = resolved + glyphs[Math.floor(Math.random() * glyphs.length)];
      await sleep(speed * 0.3);
    }
    resolved += text[i];
    el.textContent = resolved;
  }
}

async function playBootSequence() {
  const screen = $boot;
  const crosshair = screen.querySelector('.boot-crosshair');
  const rings = screen.querySelectorAll('.boot-r');

  screen.style.display = 'flex';

  function setProg(p) { $bootProgBar.style.width = p + '%'; $bootProgPct.textContent = p + '%'; }

  // Ambient data readouts
  $bootDataL.textContent = 'SYS.CORE v4.2.1\nPROTOCOL: INIT\nENCRYPT: AES-256\nNET.LINK: PENDING\nMEMORY: 0/\u221E';
  $bootDataR.textContent = 'QUANTUM.BRIDGE\nNEURAL.NET: STANDBY\nLATENCY: --ms\nUPTIME: 00:00:00\nBUILD: 2025.03';

  // Phase 1: Core ignition — rings activate one by one
  await sleep(300);
  setProg(3);
  for (let i = 0; i < rings.length - 1; i++) { // -1 to skip crosshair
    rings[i].classList.add('active');
    setProg(3 + (i + 1) * 4);
    await sleep(80 + Math.random() * 60);
  }
  // Crosshair fades in
  if (crosshair) { crosshair.style.opacity = '1'; crosshair.style.transition = 'opacity 0.5s ease'; }
  setProg(38);

  // Phase 2: Logo decode
  await sleep(200);
  await decodeText($bootLogo, 'J.A.R.V.I.S.', 40);
  setProg(50);
  await sleep(150);
  $bootSub.style.opacity = '1';
  $bootSub.textContent = 'CHAT INTERFACE';
  setProg(55);

  // Phase 3: Status text
  await sleep(200);
  await typeText($bootText, 'SUBSYSTEM INITIALIZATION...', 30);
  setProg(60);

  // Phase 4: Systems come online with natural jitter
  const systems = [
    { label: 'LLM ENGINE', pct: 68 },
    { label: 'HOME ASSISTANT', pct: 74 },
    { label: 'REDIS CACHE', pct: 80 },
    { label: 'MEMORY CORE', pct: 85 },
    { label: 'VOICE SYNTH', pct: 90 },
    { label: 'SECURITY', pct: 95 },
  ];
  $bootSystems.innerHTML = systems.map((s, i) =>
    `<div class="boot-sys" id="bootSys${i}"><span class="sys-dot"></span>${s.label}</div>`
  ).join('');

  for (let i = 0; i < systems.length; i++) {
    const el = document.getElementById('bootSys' + i);
    if (el) {
      el.classList.add('visible');
      await sleep(120 + Math.random() * 180);
      el.classList.add('online');
      setProg(systems[i].pct);
    }
  }

  // Update ambient data
  $bootDataL.textContent = 'SYS.CORE v4.2.1\nPROTOCOL: ACTIVE\nENCRYPT: AES-256\nNET.LINK: SECURE\nMEMORY: READY';
  $bootDataR.textContent = 'QUANTUM.BRIDGE\nNEURAL.NET: ONLINE\nLATENCY: <2ms\nUPTIME: 00:00:04\nBUILD: 2025.03';

  // Phase 5: Complete
  setProg(100);
  await sleep(200);
  $bootText.textContent = '';
  await typeText($bootText, 'ALL SYSTEMS OPERATIONAL', 30);
  await sleep(900);

  // Fade out
  screen.classList.add('fade-out');
  await sleep(600);
  screen.style.display = 'none';
  screen.classList.remove('fade-out');
  $app.classList.add('active');
  $input.focus();
}

// ========== Greeting ==========
function getGreeting() {
  const title = getPersonTitle(currentPerson) || 'Sir';
  const h = new Date().getHours();
  if (h < 6) return `Gute Nacht, ${title}.`;
  if (h < 12) return `Guten Morgen, ${title}. Was steht an?`;
  if (h < 18) return `Guten Tag, ${title}. Wie kann ich helfen?`;
  return `Guten Abend, ${title}. Wie kann ich behilflich sein?`;
}
function updateGreeting() {
  const el = document.querySelector('.welcome-sub');
  if (el) el.textContent = getGreeting();
}
updateGreeting();

// ========== Auto-resize textarea ==========
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
  updateSendButton();
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if ($input.value.trim() || pendingFile) sendMessage();
  }
});

function updateSendButton() {
  $btnSend.disabled = !($input.value.trim() || pendingFile);
}

// ========== Hint chips ==========
function sendHint(el) {
  $input.value = el.textContent;
  updateSendButton();
  sendMessage();
}

// ========== Time formatting ==========
function timeStr() {
  return new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

// ========== Show messages area ==========
function showMessages() {
  if ($welcome.style.display !== 'none') {
    $welcome.style.display = 'none';
    $messages.style.display = 'flex';
  }
}

// ========== Format file size ==========
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ========== Add message to chat ==========
function addMessage(role, text, actions, fileInfo) {
  showMessages();
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarText = role === 'user' ? 'Du' : role === 'proactive' ? '!' : 'J';
  let actionsHTML = '';
  if (actions && actions.length) {
    actionsHTML = '<div class="msg-actions">' +
      actions.map(a => `<span class="action-tag">${escapeHTML(a.function || a)}</span>`).join('') +
      '</div>';
  }

  let fileHTML = '';
  if (fileInfo) {
    fileHTML = `<div class="msg-file">
      <svg class="msg-file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="msg-file-name">${escapeHTML(fileInfo.name)}</span>
      <span class="msg-file-size">${formatSize(fileInfo.size)}</span>
    </div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">${avatarText}</div>
    <div class="msg-bubble">
      ${fileHTML}
      ${escapeHTML(text)}
      ${actionsHTML}
      <span class="msg-time">${timeStr()}</span>
    </div>
  `;
  $messages.appendChild(div);
  scrollToBottom();
  messageCount++;
  return div;
}

// ========== Streaming bubble ==========
function startStreamBubble() {
  showMessages();
  streamBuffer = '';
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `
    <div class="msg-avatar">J</div>
    <div class="msg-bubble">
      <span class="stream-text"></span>
      <span class="msg-time">${timeStr()}</span>
    </div>
  `;
  $messages.appendChild(div);
  streamBubble = div.querySelector('.stream-text');
  isStreaming = true;
  resetStreamTimeout();
  scrollToBottom();
  return div;
}

function appendStreamToken(token) {
  if (!streamBubble) startStreamBubble();
  streamBuffer += token;
  streamBubble.textContent = streamBuffer;
  resetStreamTimeout();
  scrollToBottom();
}

function endStream(fullText, actions) {
  clearStreamTimeout();
  if (streamBubble) {
    // fullText vom Server hat Vorrang (gefiltert). Nur wenn undefined/null
    // (z.B. Timeout) auf streamBuffer zurueckfallen.
    streamBubble.textContent = (fullText != null && fullText !== undefined)
      ? (fullText || streamBuffer)
      : streamBuffer;
    if (actions && actions.length) {
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'msg-actions';
      actionsDiv.innerHTML = actions.map(a => `<span class="action-tag">${escapeHTML(a.function || a)}</span>`).join('');
      streamBubble.parentElement.insertBefore(actionsDiv, streamBubble.parentElement.querySelector('.msg-time'));
    }
  }
  streamBubble = null;
  isStreaming = false;
  streamBuffer = '';
}

// Stream timeout — recover from stuck streams
function resetStreamTimeout() {
  clearStreamTimeout();
  streamTimeout = setTimeout(() => {
    if (isStreaming) {
      endStream(streamBuffer || '...');
      $typing.classList.remove('active');
      toast('Stream-Timeout — bitte erneut versuchen', 'error');
    }
  }, STREAM_TIMEOUT_MS);
}

function clearStreamTimeout() {
  if (streamTimeout) {
    clearTimeout(streamTimeout);
    streamTimeout = null;
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== File Upload ==========
function triggerFileInput() {
  $fileInput.click();
}

$fileInput.addEventListener('change', () => {
  if ($fileInput.files.length > 0) {
    selectFile($fileInput.files[0]);
  }
  $fileInput.value = '';
});

function selectFile(file) {
  const maxSize = 50 * 1024 * 1024;
  if (file.size > maxSize) {
    toast('Datei zu gross (max 50 MB)', 'error');
    return;
  }
  pendingFile = file;
  $filePreviewName.textContent = file.name;
  $filePreviewSize.textContent = formatSize(file.size);
  $filePreview.classList.add('active');
  updateSendButton();
}

function clearFile() {
  pendingFile = null;
  $filePreview.classList.remove('active');
  $filePreviewName.textContent = '';
  $filePreviewSize.textContent = '';
  updateSendButton();
}

// Drag and drop
let dragCounter = 0;

$inputArea.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  $dropOverlay.classList.add('active');
});

$inputArea.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    $dropOverlay.classList.remove('active');
  }
});

$inputArea.addEventListener('dragover', (e) => {
  e.preventDefault();
});

$inputArea.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  $dropOverlay.classList.remove('active');
  if (e.dataTransfer.files.length > 0) {
    selectFile(e.dataTransfer.files[0]);
  }
});

async function uploadFile(file, caption) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('caption', caption);
  if (currentPerson) formData.append('person', currentPerson);

  // Show progress
  $uploadProgress.classList.add('active');
  $uploadFill.style.width = '0%';
  $uploadText.textContent = '0%';

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API}/api/assistant/chat/upload`);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        $uploadFill.style.width = pct + '%';
        $uploadText.textContent = pct + '%';
      }
    };

    xhr.onload = () => {
      $uploadProgress.classList.remove('active');
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          resolve(JSON.parse(xhr.responseText));
        } catch (e) {
          reject(new Error('Ungueltige Server-Antwort'));
        }
      } else {
        let msg = 'Upload fehlgeschlagen';
        try {
          const err = JSON.parse(xhr.responseText);
          msg = err.detail || msg;
        } catch (e) { /* ignore */ }
        reject(new Error(msg));
      }
    };

    xhr.onerror = () => {
      $uploadProgress.classList.remove('active');
      reject(new Error('Netzwerkfehler beim Upload'));
    };

    xhr.ontimeout = () => {
      $uploadProgress.classList.remove('active');
      reject(new Error('Upload-Timeout'));
    };

    xhr.timeout = 120000;
    xhr.send(formData);
  });
}

// ========== Send message ==========
async function sendMessage() {
  const text = $input.value.trim();
  const file = pendingFile;

  if (!text && !file) return;
  if (!file && (!ws || ws.readyState !== WebSocket.OPEN)) {
    toast('Keine Verbindung zum Server — versuche neu zu verbinden...', 'error');
    connectWS();
    return;
  }

  const displayText = text || `Datei: ${file.name}`;
  addMessage('user', displayText, null, file ? { name: file.name, size: file.size } : null);

  $input.value = '';
  $input.style.height = 'auto';
  clearFile();
  updateSendButton();

  // Show typing
  $typing.classList.add('active');

  if (file) {
    // File upload path
    try {
      const result = await uploadFile(file, text);
      $typing.classList.remove('active');
      addMessage('assistant', result.response || 'Datei verarbeitet.', result.actions);
    } catch (err) {
      $typing.classList.remove('active');
      toast(err.message || 'Upload fehlgeschlagen', 'error');
    }
  } else {
    // WebSocket text path
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      $typing.classList.remove('active');
      toast('Keine Verbindung zum Server', 'error');
      return;
    }

    const payload = { text, stream: true };
    if (currentPerson) payload.person = currentPerson;
    ws.send(JSON.stringify({
      event: 'assistant.text',
      data: payload
    }));
  }
}

// ========== Toast ==========
function toast(msg, type) {
  if (toastTimer) clearTimeout(toastTimer);
  $toast.textContent = msg;
  $toast.className = 'toast';
  if (type === 'error') $toast.classList.add('toast-error');
  else if (type === 'success') $toast.classList.add('toast-success');
  $toast.classList.add('show');
  toastTimer = setTimeout(() => {
    $toast.classList.remove('show');
    toastTimer = null;
  }, 4000);
}

// ========== WebSocket ==========
function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    $statusDot.className = 'status-dot online';
    $connBanner.classList.remove('show');
    reconnectDelay = 1000;
    fetchMood();
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleWSEvent(msg);
    } catch (e) {
      console.warn('WS parse error:', e);
    }
  };

  ws.onclose = (ev) => {
    $statusDot.className = 'status-dot';
    // Only show banner if we had a connection before
    if (messageCount > 0 || ev.code !== 1006) {
      $connBanner.classList.add('show');
    }
    // Clean up stuck streaming state
    if (isStreaming) {
      endStream(streamBuffer || '');
      $typing.classList.remove('active');
    }
    scheduleReconnect();
  };

  ws.onerror = () => {
    // onclose will fire after this
  };
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    reconnectDelay = Math.min(reconnectDelay * 1.5, maxReconnectDelay);
    connectWS();
  }, reconnectDelay);
}

function handleWSEvent(msg) {
  const { event, data } = msg;
  if (!event) return;

  switch (event) {
    case 'ping':
      // Keep-alive vom Server — Pong zuruecksenden
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({event: 'pong', data: {}}));
      }
      return;

    case 'assistant.thinking':
      $typing.classList.add('active');
      break;

    case 'assistant.speaking':
      $typing.classList.remove('active');
      clearStreamTimeout();
      if (isStreaming) {
        // End any active stream first
        endStream(streamBuffer);
      }
      addMessage('assistant', data.text || '', data.actions);
      break;

    case 'assistant.stream_start':
      $typing.classList.remove('active');
      if (isStreaming) endStream(streamBuffer);
      startStreamBubble();
      break;

    case 'assistant.stream_token':
      $typing.classList.remove('active');
      appendStreamToken(data.token || '');
      break;

    case 'assistant.stream_end':
      $typing.classList.remove('active');
      endStream(data.text, data.actions);
      break;

    case 'assistant.proactive':
      $typing.classList.remove('active');
      if (isStreaming) endStream(streamBuffer);
      addMessage('proactive', data.text || '');
      break;

    case 'assistant.action':
      // Actions are shown as tags in the message
      break;

    case 'error':
      $typing.classList.remove('active');
      clearStreamTimeout();
      if (isStreaming) endStream(streamBuffer || '');
      toast(data.message || 'Fehler', 'error');
      break;
  }
}

// ========== Mood ==========
async function fetchMood() {
  try {
    const r = await fetch(`${API}/api/assistant/mood`);
    if (r.ok) {
      const d = await r.json();
      const mood = d.mood || d.current_mood || '';
      if (mood) {
        $moodBadge.textContent = mood;
        $moodBadge.style.display = '';
      } else {
        $moodBadge.style.display = 'none';
      }
    } else {
      $moodBadge.style.display = 'none';
    }
  } catch (e) {
    $moodBadge.style.display = 'none';
  }
}

// ========== Voice Mode ==========

const $voiceOverlay = document.getElementById('voiceOverlay');
const $voiceOrb = document.getElementById('voiceOrb');
const $voiceStatus = document.getElementById('voiceStatus');
const $voiceTranscript = document.getElementById('voiceTranscript');

let voiceActive = false;
let voiceMediaRecorder = null;
let voiceAudioCtx = null;
let voiceAnalyser = null;
let voiceStream = null;

function startVoiceMode() {
  voiceActive = true;
  $voiceOverlay.classList.add('active');
  $voiceTranscript.innerHTML = '';
  voiceListen();
}

function stopVoiceMode() {
  voiceActive = false;
  $voiceOverlay.classList.remove('active');
  if (voiceMediaRecorder && voiceMediaRecorder.state !== 'inactive') {
    voiceMediaRecorder.stop();
  }
  if (voiceStream) {
    voiceStream.getTracks().forEach(t => t.stop());
    voiceStream = null;
  }
  if (voiceAudioCtx) {
    voiceAudioCtx.close().catch(() => {});
    voiceAudioCtx = null;
  }
}

// Escape-Taste schliesst Voice-Mode
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && voiceActive) stopVoiceMode();
});

async function voiceListen() {
  if (!voiceActive) return;

  setVoiceState('listening');
  $voiceTranscript.innerHTML = '';

  try {
    voiceStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: 16000,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });
  } catch (e) {
    toast('Mikrofon-Zugriff verweigert', 'error');
    stopVoiceMode();
    return;
  }

  // Audio-Level Visualisierung
  voiceAudioCtx = new AudioContext();
  const source = voiceAudioCtx.createMediaStreamSource(voiceStream);
  voiceAnalyser = voiceAudioCtx.createAnalyser();
  voiceAnalyser.fftSize = 256;
  source.connect(voiceAnalyser);

  // Silence Detection: Automatisch stoppen nach 2s Stille
  const dataArray = new Uint8Array(voiceAnalyser.frequencyBinCount);
  let silenceStart = null;
  let hasSpoken = false;
  const SILENCE_THRESHOLD = 15;
  const SILENCE_DURATION = 2000; // ms
  const MAX_RECORD_TIME = 30000; // 30s max

  // MediaRecorder starten (WebM/Opus)
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';
  voiceMediaRecorder = new MediaRecorder(voiceStream, { mimeType });
  const chunks = [];

  voiceMediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  voiceMediaRecorder.onstop = async () => {
    // Stream stoppen
    voiceStream.getTracks().forEach(t => t.stop());
    voiceStream = null;
    if (voiceAudioCtx) {
      voiceAudioCtx.close().catch(() => {});
      voiceAudioCtx = null;
    }

    if (!voiceActive) return;
    if (chunks.length === 0 || !hasSpoken) {
      // Nichts gesagt — nochmal hoeren
      voiceListen();
      return;
    }

    const audioBlob = new Blob(chunks, { type: mimeType });
    await voiceProcess(audioBlob);
  };

  voiceMediaRecorder.start(250); // Chunks alle 250ms
  const recordStart = Date.now();

  // Silence-Detection Loop
  const silenceCheck = setInterval(() => {
    if (!voiceActive || !voiceMediaRecorder || voiceMediaRecorder.state === 'inactive') {
      clearInterval(silenceCheck);
      return;
    }

    voiceAnalyser.getByteFrequencyData(dataArray);
    const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

    // Orb-Groesse basierend auf Lautstaerke
    const scale = 1 + Math.min(avg / 100, 0.3);
    $voiceOrb.style.transform = `scale(${scale})`;

    if (avg > SILENCE_THRESHOLD) {
      hasSpoken = true;
      silenceStart = null;
    } else if (hasSpoken) {
      if (!silenceStart) silenceStart = Date.now();
      else if (Date.now() - silenceStart > SILENCE_DURATION) {
        // Stille erkannt — aufhoeren
        clearInterval(silenceCheck);
        voiceMediaRecorder.stop();
        return;
      }
    }

    // Max-Zeit erreicht
    if (Date.now() - recordStart > MAX_RECORD_TIME) {
      clearInterval(silenceCheck);
      voiceMediaRecorder.stop();
    }
  }, 100);
}

async function voiceProcess(audioBlob) {
  if (!voiceActive) return;

  setVoiceState('thinking');

  try {
    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');
    if (currentPerson) formData.append('person', currentPerson);

    const resp = await fetch(`${API}/api/assistant/voice/chat`, {
      method: 'POST',
      body: formData,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    const userText = decodeURIComponent(resp.headers.get('X-User-Text') || '');
    const jarvisText = decodeURIComponent(resp.headers.get('X-Jarvis-Text') || '');

    // Transcript anzeigen
    $voiceTranscript.innerHTML = '';
    if (userText) {
      const u = document.createElement('div');
      u.className = 'user-text';
      u.textContent = userText;
      $voiceTranscript.appendChild(u);
    }
    if (jarvisText) {
      const j = document.createElement('div');
      j.className = 'jarvis-text';
      j.textContent = jarvisText;
      $voiceTranscript.appendChild(j);
    }

    // Chat-History aktualisieren
    if (userText) addMessage('user', userText);
    if (jarvisText) addMessage('assistant', jarvisText);

    // Audio abspielen
    const audioData = await resp.arrayBuffer();
    if (audioData.byteLength > 44) {
      setVoiceState('speaking');
      await voicePlayAudio(audioData);
    }

    // Automatisch wieder zuhoeren
    if (voiceActive) {
      setTimeout(() => voiceListen(), 500);
    }

  } catch (e) {
    console.error('Voice-Chat Fehler:', e);
    toast(e.message || 'Voice-Chat Fehler', 'error');
    if (voiceActive) {
      setTimeout(() => voiceListen(), 1000);
    }
  }
}

function voicePlayAudio(arrayBuffer) {
  return new Promise((resolve) => {
    const blob = new Blob([arrayBuffer], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    audio.play().catch(() => resolve());
  });
}

function setVoiceState(state) {
  $voiceOrb.className = 'voice-orb';
  $voiceOrb.style.transform = '';
  switch (state) {
    case 'listening':
      $voiceOrb.classList.add('listening');
      $voiceStatus.textContent = 'HOERT ZU...';
      break;
    case 'thinking':
      $voiceOrb.classList.add('thinking');
      $voiceStatus.textContent = 'VERARBEITET...';
      break;
    case 'speaking':
      $voiceOrb.classList.add('speaking');
      $voiceStatus.textContent = 'SPRICHT...';
      break;
    default:
      $voiceStatus.textContent = 'BEREIT';
  }
}

// ========== Phase 9A: Jarvis Status Orb ==========
function updateJarvisOrb() {
  fetch('/api/jarvis/status').then(r => r.json()).then(data => {
    const orb = document.getElementById('jarvis-orb');
    if (!orb) return;
    orb.className = 'jarvis-orb ' + (data.processing ? 'thinking' : (data.inner_mood || 'neutral'));
    orb.title = 'Jarvis: ' + (data.inner_mood || 'neutral');
  }).catch(() => {});
}
setInterval(updateJarvisOrb, 10000);

// ========== Init ==========
playBootSequence();
connectWS();
updateJarvisOrb();
</script>
