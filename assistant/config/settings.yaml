# C3: Self-initiated Follow-ups — JARVIS greift offene Themen proaktiv auf
self_followup:
  enabled: true
  min_age_minutes: 15      # Mindest-Alter eines Themas bevor Follow-up
  cooldown_minutes: 60     # Max 1 Follow-up pro Stunde
  max_per_check: 1         # Max Follow-ups pro Pruefzyklus
# C7: Butler-Instinkt — Automatische Ausfuehrung bei hoher Confidence
butler_instinct:
  enabled: true
  min_autonomy_level: 3    # Autonomie-Level ab dem Auto-Execute erlaubt ist
# B3: Pre-Compaction Memory Flush — Fakten sichern vor Zusammenfassung
pre_compaction_flush:
  enabled: true
# B2: Proaktive Context Compaction — frueh kompaktieren statt erst bei Overflow
context_compaction:
  threshold: 0.70          # Bei 70% Budget-Auslastung kompaktieren
  prefer_llm: true         # LLM-Zusammenfassung statt Text-Kuerzung
# C5: Cross-Session Intent-Referenzierung ("wie gestern", "wie letzte Woche")
cross_session_references:
  enabled: true
# D5: Quality Feedback Loop — schlechte Patterns in Personality-Prompt einbauen
quality_feedback:
  enabled: true
  weak_threshold: 0.3      # Score unter dem eine Kategorie als schlecht gilt
# B6: Relationship Model — Inside Jokes, Kommunikationsstil, Milestones
relationship_model:
  enabled: true
# D3: Kontextuelles Schweigen — Antwort-Stil an Situation anpassen
contextual_silence:
  enabled: true
# A5: Narrative Gespraechsboegen — Callback zu frueheren Themen
narrative_arcs:
  enabled: true
# B12: Proaktives Selbst-Lernen — aktiv fragen bei Wissensluecken
self_learning:
  enabled: true
  cooldown_minutes: 30     # Max 1 Lern-Notiz pro 30 Minuten
# N6: JSON-Mode fuer Tool-Calls — stabilere Erkennung
json_mode_tools:
  enabled: true
# A4: Voice-Modus — TTS-optimierte Ausgabe
voice_mode:
  enabled: true
# D1: Task-aware Temperature — dynamische Temperature pro Task-Typ
task_temperature:
  enabled: true
# S8#1: Krisen-Modus — Humor deaktivieren bei Critical-Events
crisis_mode:
  enabled: true
character_lock:
