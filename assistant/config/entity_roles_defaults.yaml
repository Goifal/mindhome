# Entity-Roles Defaults: Rollen-Definitionen fuer Entity-Erkennung
#
# Dieses File definiert Rollen, die der Assistant zur Geraete-Erkennung nutzt.
# Aenderungen hier ueberschreiben die Python-Defaults.
# User-spezifische Overrides koennen in settings.yaml unter 'entity_roles:' definiert werden.
#
# Format pro Rolle:
#   role_id:
#     label: "Anzeigename"
#     icon: "Emoji"
#     keywords: ["keyword1", "keyword2", ...]
#
# Die Keywords werden fuer natuerliche-Sprache Matching verwendet:
#   "Wie warm ist es draussen?" -> keywords ["aussen", "draussen"] -> outdoor_temp
#
# device_class_to_role: Mapping von HA device_class auf Rollen-ID
#   (wird bei automatischer Entity-Erkennung verwendet)

